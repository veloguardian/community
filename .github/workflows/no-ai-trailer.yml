name: No AI attribution

# This repo is PUBLIC. No Claude / Anthropic co-author trailers or
# "Generated with" footers may ever appear in commit history.
# This check runs on GitHub, so it protects the repo from EVERY machine,
# not just ones with the local commit-msg hook installed.

on:
  push:
  pull_request:

jobs:
  scan-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if any commit message contains AI attribution
        run: |
          # Scan every commit reachable from the checked-out ref.
          pattern='Co-Authored-By:[[:space:]]*Claude|anthropic\.com|Generated with \[?Claude'
          offenders="$(git log --pretty=format:'%H' | while read -r sha; do
            if git show -s --format='%B' "$sha" | grep -Eiq "$pattern"; then
              echo "$sha $(git show -s --format='%s' "$sha")"
            fi
          done)"
          if [ -n "$offenders" ]; then
            echo "::error::AI attribution trailer/footer found in commit history:"
            echo "$offenders"
            echo ""
            echo "Remove it (e.g. git rebase / filter-repo) before pushing to this public repo."
            exit 1
          fi
          echo "Clean: no Claude/Anthropic attribution in any commit message."
