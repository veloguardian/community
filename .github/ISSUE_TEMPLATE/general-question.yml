name: General Question
description: Ask a question about VeloGuardian DNS
title: "[Question] "
labels: ["question", "dns"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question about VeloGuardian DNS? Ask here or start a [Discussion](https://github.com/veloguardian/community/discussions) for more open-ended conversation.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DNS Appliance Version (if applicable)
      description: Shown in the dashboard footer
      placeholder: "v1.0.0"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant details about your setup or what you've already tried.
    validations:
      required: false
