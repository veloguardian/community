name: DNS Bug Report
description: Report a bug in VeloGuardian DNS
title: "[Bug] "
labels: ["bug", "dns"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in VeloGuardian DNS. Please fill out the details below so we can investigate.

  - type: input
    id: version
    attributes:
      label: DNS Appliance Version
      description: Shown in the dashboard footer (e.g., v1.2.3)
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      options:
        - OVA (VMware/VirtualBox)
        - Proxmox
        - Hyper-V
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: "Describe the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information (network setup, browser, etc.)
    validations:
      required: false
